server:
  port: 8090

spring:
  config:
    import: optional:file:./etc/secrets/config.properties,optional:file:/etc/secrets/config.properties
  application:
    name: sso-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sso_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_SERVICE_URL:localhost:9092}
    properties:
      security:
        protocol: SSL
      ssl:
        truststore:
          type: PEM
          location: ${KAFKA_TRUSTSTORE_PATH:${user.dir}/src/main/resources/ca.pem}
        keystore:
          type: PKCS12
          location: ${KAFKA_KEYSTORE_PATH:${user.dir}/src/main/resources/ca.pem}
          password: changeit

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    issuer: ordernest-sso
    access-token-minutes: 15
    refresh-token-days: 7
    key-id: sso-key-1
    private-key-base64: ${JWT_PRIVATE_KEY_BASE64:}
    public-key-base64: ${JWT_PUBLIC_KEY_BASE64:}
  security:
    login-rate-limit-count: 5
    login-rate-limit-window-seconds: 60
  verification:
    token-minutes: 30
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8090}
    path: /auth/verify-email
  password-reset:
    token-minutes: 30
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8090}
    path: /auth/password-reset/confirm
  kafka:
    topic:
      email-events: notification.email.events

logging:
  level:
    root: INFO
    com.ordernest.sso: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
