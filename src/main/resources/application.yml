server:
  port: ${PORT:${SERVER_PORT:8090}}

spring:
  config:
    import: optional:file:./etc/secrets/config.properties,optional:file:/etc/secrets/config.properties
  application:
    name: sso-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sso_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    issuer: ${JWT_ISSUER:ordernest-sso}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
    key-id: ${JWT_KEY_ID:sso-key-1}
  security:
    login-rate-limit-count: ${LOGIN_RATE_LIMIT_COUNT:5}
    login-rate-limit-window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  verification:
    token-minutes: ${VERIFICATION_TOKEN_MINUTES:30}
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8090}
    path: ${VERIFICATION_PATH:/auth/verify-email}
  password-reset:
    token-minutes: ${PASSWORD_RESET_TOKEN_MINUTES:30}
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8090}
    path: ${PASSWORD_RESET_PATH:/auth/password-reset/confirm}
  notification:
    base-url: ${NOTIFICATION_BASE_URL:http://localhost:8091}
    email-path: ${NOTIFICATION_EMAIL_PATH:/notifications/email}

logging:
  level:
    root: INFO
    com.ordernest.sso: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
