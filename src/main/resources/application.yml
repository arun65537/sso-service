server:
  port: ${PORT:${SERVER_PORT:8090}}

spring:
  config:
    import: optional:file:./etc/secrets/config.properties,optional:file:/etc/secrets/config.properties
  application:
    name: sso-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sso_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_SERVICE_URL:kafka-877fe57-ordernest.i.aivencloud.com:14046}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:ordernest-order-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:SSL}
      ssl:
        truststore:
          type: PEM
          location: ${KAFKA_TRUSTSTORE_PATH:/app/ssl/ca.pem}
        keystore:
          type: PKCS12
          location: ${KAFKA_KEYSTORE_PATH:/app/ssl/client.keystore.p12}
          password: ${KAFKA_KEYSTORE_PASSWORD:changeit}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    issuer: ${JWT_ISSUER:ordernest-sso}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
    key-id: ${JWT_KEY_ID:sso-key-1}
  security:
    login-rate-limit-count: ${LOGIN_RATE_LIMIT_COUNT:5}
    login-rate-limit-window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  verification:
    token-minutes: ${VERIFICATION_TOKEN_MINUTES:30}
    base-url: ${VERIFICATION_BASE_URL:http://localhost:8090}
    path: ${VERIFICATION_PATH:/auth/verify-email}
  password-reset:
    token-minutes: ${PASSWORD_RESET_TOKEN_MINUTES:30}
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8090}
    path: ${PASSWORD_RESET_PATH:/auth/password-reset/confirm}
  notification:
    base-url: ${NOTIFICATION_BASE_URL:http://localhost:8091}
    email-path: ${NOTIFICATION_EMAIL_PATH:/notifications/email}
  kafka:
    topic:
      email-events: ${EMAIL_EVENTS_TOPIC:notification.email.events}
      order-status-events: ${ORDER_STATUS_EVENTS_TOPIC:order.status.events}
    consumer:
      order-status-group-id: ${ORDER_STATUS_EVENTS_CONSUMER_GROUP_ID:sso-service-order-status-consumer}
  order-status:
    base-url: ${ORDER_DETAILS_BASE_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    com.ordernest.sso: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
